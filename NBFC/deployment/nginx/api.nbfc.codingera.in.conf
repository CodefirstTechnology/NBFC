# Backend API — api.nbfc.codingera.in
# After DNS propagates, run: sudo certbot --nginx -d api.nbfc.codingera.in

upstream nbfc_gateway {
    server 127.0.0.1:15000;
    keepalive 16;
}

server {
    listen 80;
    server_name api.nbfc.codingera.in;

    client_max_body_size 50m;

    location / {
        proxy_pass         http://nbfc_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
