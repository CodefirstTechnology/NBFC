# Frontend — nbfc.codingera.in
# After DNS propagates, run: sudo certbot --nginx -d nbfc.codingera.in

upstream nbfc_shell {
    server 127.0.0.1:15200;
    keepalive 8;
}

upstream nbfc_mfe_member {
    server 127.0.0.1:15201;
    keepalive 4;
}

upstream nbfc_mfe_deposit {
    server 127.0.0.1:15202;
    keepalive 4;
}

upstream nbfc_mfe_loan {
    server 127.0.0.1:15203;
    keepalive 4;
}

upstream nbfc_mfe_collection {
    server 127.0.0.1:15204;
    keepalive 4;
}

upstream nbfc_mfe_recovery {
    server 127.0.0.1:15205;
    keepalive 4;
}

upstream nbfc_mfe_accounting {
    server 127.0.0.1:15206;
    keepalive 4;
}

upstream nbfc_mfe_reports {
    server 127.0.0.1:15207;
    keepalive 4;
}

upstream nbfc_mfe_admin {
    server 127.0.0.1:15208;
    keepalive 4;
}

server {
    listen 80;
    server_name nbfc.codingera.in;

    client_max_body_size 20m;

    location /mfe-member/ {
        proxy_pass         http://nbfc_mfe_member/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-deposit/ {
        proxy_pass         http://nbfc_mfe_deposit/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-loan/ {
        proxy_pass         http://nbfc_mfe_loan/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-collection/ {
        proxy_pass         http://nbfc_mfe_collection/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-recovery/ {
        proxy_pass         http://nbfc_mfe_recovery/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-accounting/ {
        proxy_pass         http://nbfc_mfe_accounting/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-reports/ {
        proxy_pass         http://nbfc_mfe_reports/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /mfe-admin/ {
        proxy_pass         http://nbfc_mfe_admin/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://nbfc_shell;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
