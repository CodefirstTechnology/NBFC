x-db-connection: &db-connection Host=postgres;Port=5432;Database=${POSTGRES_DB:-patsanstha};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-patsanstha}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:5432:5432"
    volumes:
      - patsanstha_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-patsanstha}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    volumes:
      - patsanstha_redis:/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: patsanstha/api:latest
    ports:
      - "${API_PORT:-5080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: *db-connection
      ConnectionStrings__Members: *db-connection
      ConnectionStrings__Deposits: *db-connection
      ConnectionStrings__Loans: *db-connection
      ConnectionStrings__Recovery: *db-connection
      ConnectionStrings__Collections: *db-connection
      ConnectionStrings__Reporting: *db-connection
      ConnectionStrings__Accounting: *db-connection
      ConnectionStrings__Hangfire: *db-connection
      ConnectionStrings__Redis: redis:6379
      Jwt__Issuer: ${JWT__Issuer:-Patsanstha}
      Jwt__Audience: ${JWT__Audience:-Patsanstha.Api}
      Jwt__SigningKey: ${JWT__SigningKey:?Set JWT__SigningKey in .env}
      Jwt__AccessTokenMinutes: ${JWT__AccessTokenMinutes:-15}
      Jwt__RefreshTokenDays: ${JWT__RefreshTokenDays:-7}
      PiiEncryption__Key: ${PiiEncryption__Key:?Set PiiEncryption__Key in .env}
      IdentitySeed__DefaultTenantId: ${IdentitySeed__DefaultTenantId:-00000000-0000-0000-0000-000000000001}
      IdentitySeed__AdminEmail: ${IdentitySeed__AdminEmail:-admin@patsanstha.local}
      IdentitySeed__AdminPassword: ${IdentitySeed__AdminPassword:?Set IdentitySeed__AdminPassword in .env}
      IdentitySeed__AdminFullName: ${IdentitySeed__AdminFullName:-System Administrator}
      Startup__AutoMigrate: ${STARTUP_AUTO_MIGRATE:-true}
      Startup__SeedIdentity: ${STARTUP_SEED_IDENTITY:-true}
      MemberDocuments__RootPath: uploads/members
      MemberDocuments__PublicBasePath: /api/v1/members/files
    volumes:
      - patsanstha_uploads:/app/uploads
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: patsanstha/gateway:latest
    ports:
      - "${GATEWAY_PORT:-5000}:8080"
    depends_on:
      - api
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ReverseProxy__Clusters__api-cluster__Destinations__api-primary__Address: ${GATEWAY_API_ADDRESS:-http://api:8080/}
    restart: unless-stopped

  shell:
    build:
      context: ./frontend
      args:
        APP_NAME: shell
    image: patsanstha/shell:latest
    ports:
      - "${SHELL_PORT:-4200}:80"
    restart: unless-stopped

  mfe-member:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-member
    image: patsanstha/mfe-member:latest
    ports:
      - "4201:80"
    restart: unless-stopped

  mfe-deposit:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-deposit
    image: patsanstha/mfe-deposit:latest
    ports:
      - "4202:80"
    restart: unless-stopped

  mfe-loan:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-loan
    image: patsanstha/mfe-loan:latest
    ports:
      - "4203:80"
    restart: unless-stopped

  mfe-collection:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-collection
    image: patsanstha/mfe-collection:latest
    ports:
      - "4204:80"
    restart: unless-stopped

  mfe-recovery:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-recovery
    image: patsanstha/mfe-recovery:latest
    ports:
      - "4205:80"
    restart: unless-stopped

  mfe-accounting:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-accounting
    image: patsanstha/mfe-accounting:latest
    ports:
      - "4206:80"
    restart: unless-stopped

  mfe-reports:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-reports
    image: patsanstha/mfe-reports:latest
    ports:
      - "4207:80"
    restart: unless-stopped

  mfe-admin:
    build:
      context: ./frontend
      args:
        APP_NAME: mfe-admin
    image: patsanstha/mfe-admin:latest
    ports:
      - "4208:80"
    restart: unless-stopped

volumes:
  patsanstha_pg:
  patsanstha_redis:
  patsanstha_uploads:
