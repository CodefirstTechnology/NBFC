<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#264679",
                        "outline": "#747780",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#a5a8aa",
                        "surface-bright": "#faf9fe",
                        "on-tertiary-fixed-variant": "#44474a",
                        "primary-fixed": "#d7e3ff",
                        "outline-variant": "#c4c6d0",
                        "on-tertiary-fixed": "#191c1e",
                        "surface-container": "#eeedf2",
                        "surface-dim": "#dad9de",
                        "on-error-container": "#93000a",
                        "secondary": "#0060ac",
                        "surface-container-high": "#e8e7ec",
                        "on-surface": "#1a1b1f",
                        "inverse-primary": "#abc7ff",
                        "surface-tint": "#405e92",
                        "tertiary": "#24272a",
                        "surface-container-low": "#f4f3f8",
                        "surface-container-highest": "#e3e2e7",
                        "surface-variant": "#e3e2e7",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf9fe",
                        "primary-container": "#1a3c6e",
                        "tertiary-container": "#3a3d40",
                        "inverse-surface": "#2f3034",
                        "on-secondary-container": "#003e73",
                        "on-primary-container": "#8aa8e0",
                        "on-primary": "#ffffff",
                        "surface": "#faf9fe",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#001c39",
                        "on-secondary": "#ffffff",
                        "error": "#ba1a1a",
                        "secondary-container": "#68abff",
                        "primary": "#002653",
                        "on-surface-variant": "#43474f",
                        "inverse-on-surface": "#f1f0f5",
                        "on-primary-fixed": "#001b3f",
                        "on-secondary-fixed-variant": "#004883",
                        "tertiary-fixed-dim": "#c4c7ca",
                        "primary-fixed-dim": "#abc7ff",
                        "secondary-fixed": "#d4e3ff",
                        "on-background": "#1a1b1f",
                        "secondary-fixed-dim": "#a4c9ff",
                        "tertiary-fixed": "#e0e3e6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "48px",
                        "stack-sm": "8px",
                        "container-margin": "20px",
                        "gutter": "16px",
                        "stack-md": "16px",
                        "stack-lg": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Manrope"],
                        "numeral-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "body-md": ["Manrope"],
                        "numeral-lg": ["Manrope"],
                        "label-md": ["Manrope"]
                    },
                    "fontSize": {
                        "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "numeral-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "numeral-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.03em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #faf9fe;
            width: 390px;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .outcome-card input:checked + label {
            background-color: #1a3c6e;
            color: #8aa8e0;
            border-color: #1a3c6e;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface shadow-sm h-touch-target-min flex flex-col justify-center px-container-margin">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a financial collection agent in a corporate setting. The lighting is soft and professional, with a clean office background featuring muted blue tones. The agent is wearing a modern business casual outfit, conveying trust and reliability in a high-end fintech environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBULgKRV9YVH0W25P-Tzl1SpziS3rBptOFtiL-_hoxc7T86Ux9yEYfBmsAXs9wyMVP9LvF5IKy9bP5o_TOzaaBar0WhBGsk16Kp-fioAunnSWCO8VwVCgaYK0rhQNW93-FsCHrEiCwO8IdMt16J4DgDCjnH32s6n4q4n9XmCvesEzwaDyzj5iw2jQ6zjstl1MglHW6R4HZyD4Z2puakI7pMxi64fipwZWkT2BVJX2wtOopUPdpPoQ53SRvbk3Eb84GIqeNfJ7KUO3c4"/>
</div>
<h1 class="font-headline-md text-headline-md text-primary">Log Visit Outcome</h1>
</div>
<span class="material-symbols-outlined text-primary">cloud_off</span>
</div>
</header>
<!-- Main Content Area -->
<main class="mt-[64px] px-container-margin py-stack-lg">
<!-- Case Summary Glassmorphic Card -->
<div class="bg-white rounded-xl p-4 shadow-[0px_4px_20px_0px_rgba(26,60,110,0.05)] border border-surface-container-high mb-stack-lg">
<p class="font-label-md text-label-md text-outline uppercase tracking-wider mb-1">Current Case</p>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Ref: #8829-PX</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">location_on</span> 124 Baker Street, London
            </p>
</div>
<form class="space-y-stack-lg">
<!-- Outcome Segmented Control -->
<section>
<label class="font-label-md text-label-md text-on-surface-variant block mb-stack-sm">VISIT OUTCOME</label>
<div class="grid grid-cols-2 gap-2">
<div class="outcome-card">
<input checked="" class="hidden" id="paid" name="outcome" type="radio"/>
<label class="flex flex-col items-center justify-center h-touch-target-min border border-outline-variant rounded-lg transition-all active:scale-95 cursor-pointer hover:bg-surface-container" for="paid">
<span class="font-label-md text-label-md">Paid</span>
</label>
</div>
<div class="outcome-card">
<input class="hidden" id="promised" name="outcome" type="radio"/>
<label class="flex flex-col items-center justify-center h-touch-target-min border border-outline-variant rounded-lg transition-all active:scale-95 cursor-pointer hover:bg-surface-container" for="promised">
<span class="font-label-md text-label-md">Promised</span>
</label>
</div>
<div class="outcome-card">
<input class="hidden" id="not_home" name="outcome" type="radio"/>
<label class="flex flex-col items-center justify-center h-touch-target-min border border-outline-variant rounded-lg transition-all active:scale-95 cursor-pointer hover:bg-surface-container" for="not_home">
<span class="font-label-md text-label-md">Not Home</span>
</label>
</div>
<div class="outcome-card">
<input class="hidden" id="refused" name="outcome" type="radio"/>
<label class="flex flex-col items-center justify-center h-touch-target-min border border-outline-variant rounded-lg transition-all active:scale-95 cursor-pointer hover:bg-surface-container" for="refused">
<span class="font-label-md text-label-md">Refused</span>
</label>
</div>
</div>
</section>
<!-- Visit Notes -->
<section>
<label class="font-label-md text-label-md text-on-surface-variant block mb-stack-sm" for="notes">VISIT NOTES</label>
<textarea class="w-full bg-white border border-outline-variant rounded-lg p-3 text-body-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all" id="notes" placeholder="Enter detailed observations..." rows="4"></textarea>
</section>
<!-- Photo Capture -->
<section>
<label class="font-label-md text-label-md text-on-surface-variant block mb-stack-sm">PHOTO EVIDENCE (OPTIONAL)</label>
<div class="relative w-full h-[160px] rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center gap-2 group active:bg-surface-container-high transition-colors overflow-hidden">
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<div class="w-full h-full bg-[radial-gradient(#1a3c6e_1px,transparent_1px)] [background-size:20px_20px]"></div>
</div>
<div class="z-10 flex flex-col items-center pointer-events-none">
<span class="material-symbols-outlined text-primary text-[32px] mb-1">camera_enhance</span>
<p class="font-label-md text-label-md text-primary">Capture Visit Photo</p>
<p class="text-[10px] text-outline mt-1 italic">GPS Timestamped Evidence</p>
</div>
</div>
</section>
<!-- Action Button -->
<button class="w-full h-touch-target-min bg-primary-container text-on-primary-container font-headline-md rounded-xl shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2 mt-stack-lg" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                Save Log
            </button>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center h-[80px] px-2 pb-safe bg-surface-container-lowest shadow-[0px_-4px_20px_0px_rgba(26,60,110,0.05)] z-50 rounded-t-xl">
<!-- Visit List (Active) -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">assignment</span>
<span class="font-label-md text-label-md">Visit List</span>
</button>
<!-- History -->
<button class="flex flex-col items-center justify-center text-outline active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">history</span>
<span class="font-label-md text-label-md">History</span>
</button>
<!-- Profile -->
<button class="flex flex-col items-center justify-center text-outline active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">person</span>
<span class="font-label-md text-label-md">Profile</span>
</button>
</nav>
<script>
        // Simple micro-interaction for radio labels
        document.querySelectorAll('input[name="outcome"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.querySelectorAll('.outcome-card label').forEach(label => {
                    label.classList.remove('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                    label.classList.add('border-outline-variant');
                });
                if (e.target.checked) {
                    const label = document.querySelector(`label[for="${e.target.id}"]`);
                    label.classList.add('bg-primary-container', 'text-on-primary-container', 'border-primary-container');
                    label.classList.remove('border-outline-variant');
                }
            });
        });
    </script>
</body></html>
