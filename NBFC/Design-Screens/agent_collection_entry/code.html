<script>
        // Micro-interaction for buttons
        document.querySelectorAll('button, a').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.8';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });

        // Simple toggle logic for payment modes
        const paymentButtons = document.querySelectorAll('.grid-cols-3 button:not(.h-14)');
        paymentButtons.forEach(button => {
            button.addEventListener('click', () => {
                paymentButtons.forEach(btn => {
                    btn.classList.remove('bg-primary-container', 'text-on-primary-container');
                    btn.classList.add('hover:bg-surface-container-high', 'text-on-surface-variant');
                    const icon = btn.querySelector('.material-symbols-outlined');
                    if (icon) icon.style.fontVariationSettings = "'FILL' 0";
                });
                button.classList.remove('hover:bg-surface-container-high', 'text-on-surface-variant');
                button.classList.add('bg-primary-container', 'text-on-primary-container');
                const activeIcon = button.querySelector('.material-symbols-outlined');
                if (activeIcon) activeIcon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
