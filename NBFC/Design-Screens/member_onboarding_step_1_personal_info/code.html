<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Member Onboarding - Sahakari Bank</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1a1b20",
                    "inverse-surface": "#2f3035",
                    "surface-container-low": "#f4f3fa",
                    "secondary-fixed": "#8df9ac",
                    "on-secondary-container": "#00723b",
                    "primary-container": "#1a3c6e",
                    "surface-tint": "#405e92",
                    "text-secondary": "#404040",
                    "surface": "#faf8ff",
                    "secondary-fixed-dim": "#71dc92",
                    "outline-variant": "#c4c6d0",
                    "on-primary-fixed-variant": "#264679",
                    "outline": "#747780",
                    "on-tertiary-fixed-variant": "#633f00",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#00210d",
                    "on-secondary": "#ffffff",
                    "border-subtle": "#E2E8F0",
                    "on-tertiary-container": "#e0992c",
                    "surface-variant": "#e3e2e9",
                    "on-secondary-fixed-variant": "#005229",
                    "on-primary-fixed": "#001b3f",
                    "inverse-on-surface": "#f1f0f7",
                    "on-background": "#1a1b20",
                    "secondary-container": "#8af6a9",
                    "surface-bright": "#faf8ff",
                    "primary": "#002653",
                    "primary-fixed": "#d7e3ff",
                    "secondary": "#006d38",
                    "surface-container-highest": "#e3e2e9",
                    "error": "#ba1a1a",
                    "on-error": "#ffffff",
                    "on-primary-container": "#8aa8e0",
                    "on-primary": "#ffffff",
                    "surface-muted": "#F8FAFC",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#e9e7ee",
                    "tertiary-fixed-dim": "#ffb956",
                    "inverse-primary": "#abc7ff",
                    "surface-dim": "#dad9e0",
                    "primary-fixed-dim": "#abc7ff",
                    "tertiary-fixed": "#ffddb5",
                    "tertiary": "#392200",
                    "on-tertiary-fixed": "#2a1800",
                    "on-surface-variant": "#43474f",
                    "error-npa": "#D64545",
                    "tertiary-container": "#563600",
                    "on-error-container": "#93000a",
                    "background": "#faf8ff",
                    "surface-container": "#eeedf4",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "base": "8px",
                    "container-margin-mobile": "16px",
                    "container-margin-desktop": "32px",
                    "section-gap": "48px",
                    "gutter": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "body-md": ["Inter"],
                    "headline-lg": ["Manrope"],
                    "title-md": ["Manrope"],
                    "headline-lg-mobile": ["Manrope"],
                    "body-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "display-lg": ["Manrope"]
            },
            "fontSize": {
                    "label-md": ["13px", {"lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "1.2", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "title-md": ["20px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "body-sm": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body { background-color: #faf8ff; color: #1a1b20; font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid #E2E8F0; }
        .step-active { background-color: #1a3c6e; color: white; }
        .step-inactive { background-color: #eeedf4; color: #43474f; }
        .accent-border { border-top: 4px solid #1a3c6e; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-container-margin-mobile md:p-container-margin-desktop">
<!-- Main Wizard Container -->
<main class="w-full max-w-4xl glass-card rounded-xl shadow-sm accent-border overflow-hidden animate-in fade-in duration-700">
<!-- Header & Stepper -->
<header class="bg-surface-container-low p-base md:p-gutter border-b border-border-subtle">
<div class="flex flex-col md:flex-row md:items-center justify-between gap-gutter mb-6">
<div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Member Onboarding</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">how_to_reg</span>
                        New Account Creation Wizard
                    </p>
</div>
<div class="flex items-center gap-2 px-4 py-2 bg-white rounded-full border border-border-subtle shadow-sm">
<span class="font-label-md text-label-md text-primary">Progress: 25%</span>
<div class="w-24 h-2 bg-surface-container-highest rounded-full overflow-hidden">
<div class="w-1/4 h-full bg-primary transition-all duration-500"></div>
</div>
</div>
</div>
<!-- Horizontal Stepper -->
<nav class="grid grid-cols-4 gap-2 md:gap-gutter relative">
<!-- Line background -->
<div class="absolute top-5 left-0 w-full h-[2px] bg-surface-container-highest -z-10 hidden md:block"></div>
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center text-center gap-2">
<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-active shadow-md ring-4 ring-primary/10">1</div>
<div class="hidden md:block">
<p class="font-label-md text-label-md text-primary">Personal Info</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">वैयक्तिक माहिती</p>
</div>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center text-center gap-2 opacity-60">
<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-inactive">2</div>
<div class="hidden md:block">
<p class="font-label-md text-label-md text-on-surface-variant">KYC Details</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">केवायसी तपशील</p>
</div>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center text-center gap-2 opacity-60">
<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-inactive">3</div>
<div class="hidden md:block">
<p class="font-label-md text-label-md text-on-surface-variant">Employment</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">रोजगार</p>
</div>
</div>
<!-- Step 4 -->
<div class="flex flex-col items-center text-center gap-2 opacity-60">
<div class="w-10 h-10 rounded-full flex items-center justify-center font-bold step-inactive">4</div>
<div class="hidden md:block">
<p class="font-label-md text-label-md text-on-surface-variant">Preview</p>
<p class="font-label-sm text-label-sm text-on-surface-variant">पूर्वावलोकन</p>
</div>
</div>
</nav>
</header>
<!-- Form Body -->
<div class="p-gutter md:p-section-gap">
<form action="#" class="space-y-gutter">
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- Photo Upload Zone -->
<div class="md:col-span-3 flex flex-col items-center">
<div class="w-full aspect-square md:w-40 md:h-40 rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-lowest flex flex-col items-center justify-center text-center p-4 hover:border-primary transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-outline text-4xl group-hover:text-primary transition-colors">add_a_photo</span>
<p class="mt-2 font-label-sm text-label-sm text-outline group-hover:text-primary">Member Photo</p>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-70">फोटो अपलोड</p>
</div>
<p class="mt-2 font-label-sm text-label-sm text-on-surface-variant text-center">JPG/PNG, Max 2MB</p>
</div>
<!-- Fields Cluster -->
<div class="md:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Full Name -->
<div class="md:col-span-2 space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Full Name</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">पूर्ण नाव</span>
</label>
<input class="w-full border-border-subtle rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white transition-all" placeholder="Enter member's full name" type="text"/>
</div>
<!-- Date of Birth -->
<div class="space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Date of Birth</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">जन्म तारीख</span>
</label>
<div class="relative">
<input class="w-full border-border-subtle rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white" type="date"/>
</div>
</div>
<!-- Gender -->
<div class="space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Gender</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">लिंग</span>
</label>
<select class="w-full border-border-subtle rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white appearance-none">
<option disabled="" selected="" value="">Select Gender</option>
<option value="male">Male / पुरुष</option>
<option value="female">Female / महिला</option>
<option value="other">Other / इतर</option>
</select>
</div>
</div>
</div>
<!-- Contact Info Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter pt-4 border-t border-surface-container-highest">
<!-- Contact Number -->
<div class="space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Contact Number</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">संपर्क क्रमांक</span>
</label>
<div class="flex">
<span class="inline-flex items-center px-3 rounded-l-lg border border-r-0 border-border-subtle bg-surface-muted text-on-surface-variant font-label-md">+91</span>
<input class="w-full border-border-subtle rounded-r-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white" placeholder="9876543210" type="tel"/>
</div>
</div>
<!-- Email Address -->
<div class="space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Email Address</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">ईमेल पत्ता</span>
</label>
<input class="w-full border-border-subtle rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white" placeholder="example@mail.com" type="email"/>
</div>
<!-- Permanent Address -->
<div class="md:col-span-2 space-y-1">
<label class="block">
<span class="font-label-md text-label-md text-on-surface block">Permanent Address</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">कायमचा पत्ता</span>
</label>
<textarea class="w-full border-border-subtle rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary focus:border-primary bg-white" placeholder="Enter house number, street, area, city, pincode" rows="3"></textarea>
</div>
</div>
</form>
</div>
<!-- Sticky Footer Actions -->
<footer class="bg-surface-container-low p-gutter border-t border-border-subtle flex flex-col md:flex-row justify-between items-center gap-4">
<button class="w-full md:w-auto px-6 py-3 font-label-md text-label-md text-primary border border-primary rounded-lg hover:bg-primary/5 transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined text-[20px]">drafts</span>
                Save Draft
            </button>
<div class="flex flex-col md:flex-row w-full md:w-auto gap-4">
<button class="w-full md:w-auto px-10 py-3 font-label-md text-label-md bg-primary text-on-primary rounded-lg hover:bg-primary-container transition-all flex items-center justify-center gap-2 shadow-lg shadow-primary/20" type="submit">
                    Next Step
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</footer>
</main>
<!-- Support Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-20 opacity-30 pointer-events-none">
<div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary rounded-full mix-blend-multiply filter blur-[100px] animate-pulse"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[400px] h-[400px] bg-secondary-container rounded-full mix-blend-multiply filter blur-[100px]"></div>
</div>
<script>
        // Simple micro-interaction for the next button
        const nextBtn = document.querySelector('button[type="submit"]');
        nextBtn.addEventListener('mousedown', () => {
            nextBtn.style.transform = 'scale(0.98)';
        });
        nextBtn.addEventListener('mouseup', () => {
            nextBtn.style.transform = 'scale(1)';
        });

        // Toggle focus state for better visualization
        const inputs = document.querySelectorAll('input, select, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('.space-y-1').classList.add('opacity-100');
            });
        });
    </script>
</body></html>
